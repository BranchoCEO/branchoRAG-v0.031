[package]
name = "branchoRAG"
version = "0.1.0"
edition = "2021"

[lib]
# "cdylib" tells Rust to compile this as a Python module, not a standard Rust app
name = "branchograph"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.20", features = ["extension-module"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
